# =============================================================================
# Baby Tracker — Nginx virtual host (HTTPS)
# Replace <YOUR_DOMAIN> with your actual domain, e.g. api.hungercues.com
# =============================================================================

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name <YOUR_DOMAIN>;

    # Let's Encrypt ACME challenge (needed for initial cert + renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other HTTP traffic → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (TLS terminated here) ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name <YOUR_DOMAIN>;

    # Let's Encrypt certificates (managed by Certbot container)
    ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — tell browsers to always use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── AI endpoints (stricter rate limit) ──────────────────────────────────
    location ~ ^/api/v[0-9]+/ai/ {
        limit_req zone=ai burst=5 nodelay;

        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        # Longer timeout for AI responses
        proxy_read_timeout 120s;
    }

    # ── Health check (no rate limit, no auth) ────────────────────────────────
    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ── Grafana dashboard ────────────────────────────────────────────────────
    # Protected by Grafana's own login
    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Flower (Celery UI) ── behind HTTP basic auth ─────────────────────────
    location /flower/ {
        auth_basic           "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://flower:5555/flower/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Prometheus ── internal only, not exposed here (use Grafana instead) ──
    # If you need direct Prometheus access, uncomment and protect with auth:
    # location /prometheus/ {
    #     auth_basic "Restricted";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     proxy_pass http://prometheus:9090/;
    # }

    # Block common exploit paths
    location ~ /\.(?!well-known) {
        deny all;
    }
}
