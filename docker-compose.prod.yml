version: "3.9"

# =============================================================================
# Baby Tracker — Production Docker Compose
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set via .env.prod or CI secrets injected
# to /opt/baby-tracker/.env on the VPS):
#   POSTGRES_PASSWORD, GEMINI_API_KEY, FIREBASE_*, R2_*, SENTRY_DSN,
#   ALLOWED_ORIGINS, GRAFANA_ADMIN_PASSWORD
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: baby_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Not exposed externally — backend connects via internal Docker network
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Redis — task queue broker + cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/baby-tracker-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    # Not exposed directly — Nginx is the only public entry point

  # ---------------------------------------------------------------------------
  # Celery Worker — processes background tasks
  # ---------------------------------------------------------------------------
  celery-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/baby-tracker-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic task scheduler (replaces asyncio loop)
  # ---------------------------------------------------------------------------
  celery-beat:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/baby-tracker-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info
    env_file: .env
    environment:
      ENVIRONMENT: production
    depends_on:
      - redis
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Flower — Celery monitoring UI (accessible via /flower/ through Nginx)
  # ---------------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    command: celery flower --broker=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0 --url-prefix=flower
    depends_on:
      - redis
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Grafana — metrics dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # cAdvisor — Docker container resource metrics → feeds Prometheus
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy, SSL termination, rate limiting
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - grafana
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt SSL certificate renewal
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  certbot_www:
  certbot_certs:

# =============================================================================
# Networks
# =============================================================================
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
