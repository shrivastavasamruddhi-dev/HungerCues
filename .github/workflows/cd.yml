name: CD — Deploy to Hetzner

on:
  push:
    branches: [main]

# Only one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    # Only deploy after CI has passed (ci.yml runs on the same event)
    needs: []          # Will be updated to `needs: [ci]` once CI is stable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------------
      # Build and push backend Docker image to GitHub Container Registry
      # -------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/baby-tracker-backend:latest
            ghcr.io/${{ github.repository_owner }}/baby-tracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------------------------------------------------
      # SSH into Hetzner and pull + restart the stack
      # -------------------------------------------------------------------
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            echo "=== Pulling latest images ==="
            cd /opt/baby-tracker
            docker compose -f docker-compose.prod.yml pull

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

            echo "=== Restarting services ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Smoke test ==="
            sleep 5
            curl -sf http://localhost:8000/health || (echo "Health check failed" && exit 1)

            echo "=== Deploy complete ==="

      - name: Notify Sentry of new release
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            npx @sentry/cli releases new ${{ github.sha }}
            npx @sentry/cli releases set-commits ${{ github.sha }} --auto
            npx @sentry/cli releases finalize ${{ github.sha }}
          fi
